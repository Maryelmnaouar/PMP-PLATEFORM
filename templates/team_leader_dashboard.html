<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Coca-Cola x Cobomi Maintenance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --red-dark: #b51212;
    --red-light: #e41b13;
    --bg-light: #fff6f6;
    --card-bg: #fff3f3;
    --text: #1a1a1a;
    --muted: #555;
    --shadow: 0 6px 25px rgba(0,0,0,0.12);
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg-light), #ffe0e0);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(90deg, var(--muted), var(--red-light));
    padding: 16px 28px;
    box-shadow: var(--shadow);
    color: #fff;
  }

  .logo-box {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo-box img {
    height: 55px;
    transition: transform 0.4s ease;
  }

  .logo-box img:hover {
    transform: scale(1.05);
  }

  .title-zone {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-align: center;
  }

  a.logout {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 14px;
    border-radius: 8px;
    transition: 0.3s;
  }

  a.logout:hover {
    background: rgba(255,255,255,0.2);
  }

  .container {
    max-width: 1200px;
    margin: 30px auto 50px;
    padding:  100px;
    position: relative;
  }

  /* grille des 6 boutons */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 26px;
    margin-top: 20px;
  }

  @media (max-width: 900px) {
    .menu-grid {
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
  }

  @media (max-width: 640px) {
    .menu-grid {
      grid-template-columns: 1fr;
    }
  }

  .menu-card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 22px 18px;
    text-align: center;
    border: 1.8px solid rgba(181,18,18,0.7);
    text-decoration: none;
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
  }

  .menu-card i {
    font-size: 1.5rem;
    color: var(--red-dark);
  }

  .menu-card:hover {
    background: linear-gradient(180deg, #ffe0e0, #ffd0d0);
    transform: translateY(-6px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  }

  .menu-card:hover i {
    color: var(--red-light);
  }

  .menu-title {
    font-size: 1.05rem;
  }

  .menu-sub {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .footer {
    text-align: center;
    color: var(--muted);
    margin: 0 0 16px;
    font-size: 0.85rem;
  }

  .coca-bottle {
    position: fixed;
    bottom: 30px;
    right: 40px;
    height: 170px;
    animation: float 4s ease-in-out infinite;
    opacity: 0.95;
    z-index: 10;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%    { transform: translateY(-14px); }
  }

  #fx {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    opacity: 0.55;
  }
</style>
</head>

<h2>Tâches à confirmer</h2>

<table border="1">

<tr>
<th>Machine</th>
<th>Description</th>
<th>Opérateur</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for t in tasks %}

<tr>
<td>{{t.machine}}</td>
<td>{{t.description}}</td>
<td>{{t.username}}</td>
<td>{{t.closed_at}}</td>

<td>

<form method="POST" action="/leader/validate/{{t.id}}">

<button type="submit">
Confirmer
</button>

</form>

</td>

</tr>

{% endfor %}

</table>
